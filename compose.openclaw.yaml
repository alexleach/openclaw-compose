name: openclaw-compose

services:
  openclaw:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    restart: unless-stopped
    env_file:
      - ./.env.openclaw
    volumes:
      - openclaw_state:/home/node/.openclaw
      - ${OPENCLAW_PROJECT_DIR:-.}:/workspace
      - ${OPENCLAW_SEED_DIR:-./openclaw}:/seed/openclaw:ro
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
      # Optional SSH mount via profile:
      # docker compose --profile ssh up -d
      # This path can be adjusted in .env.openclaw.
    profiles: ["default"]

  openclaw-ssh:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    restart: unless-stopped
    env_file:
      - ./.env.openclaw
    volumes:
      - openclaw_state:/home/node/.openclaw
      - ${OPENCLAW_PROJECT_DIR:-.}:/workspace
      - ${OPENCLAW_SEED_DIR:-./openclaw}:/seed/openclaw:ro
      - ${OPENCLAW_SSH_DIR:-${HOME}/.ssh}:/home/node/.ssh:ro
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    profiles: ["ssh"]

volumes:
  openclaw_state:
    name: ${OPENCLAW_STATE_VOLUME:-openclaw_state}
